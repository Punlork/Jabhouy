  fastlane-android-release:
    name: Fastlane Android (release)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Read pubspec version
        id: version
        shell: bash
        run: |
          VERSION_LINE="$(grep '^version:' pubspec.yaml | head -n 1 | awk '{print $2}')"
          APP_VERSION="${VERSION_LINE%%+*}"
          BUILD_NUMBER="${VERSION_LINE#*+}"
          TAG_NAME="v${APP_VERSION}"
          RELEASE_TITLE="Jabhouy v${APP_VERSION}"

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_title=${RELEASE_TITLE}" >> "$GITHUB_OUTPUT"

      - name: Fail if version tag already exists
        shell: bash
        run: |
          git fetch --tags --force
          if git rev-parse "${{ steps.version.outputs.tag_name }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag_name }} already exists. Bump pubspec version before releasing."
            exit 1
          fi

      - name: Set up Ruby and Fastlane
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: android

      - name: Install Fastlane (Android)
        working-directory: android
        run: bundle install

      - name: Build production APK
        working-directory: android
        run: bundle exec fastlane build_release_ci

      - name: Prepare release asset
        id: apk
        shell: bash
        run: |
          APK_SOURCE="$(find build/app/outputs/flutter-apk -name 'app-production-release.apk' -print -quit)"
          if [ -z "$APK_SOURCE" ]; then
            echo "Production APK not found."
            exit 1
          fi

          mkdir -p build/releases
          APK_TARGET="build/releases/Jabhouy-v${{ steps.version.outputs.app_version }}.apk"
          cp "$APK_SOURCE" "$APK_TARGET"

          echo "apk_path=$APK_TARGET" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          PREVIOUS_TAG="$(git tag --list 'v*' --sort=-version:refname | grep -vx '${{ steps.version.outputs.tag_name }}' | head -n 1 || true)"
          NOTES_FILE="build/releases/release-notes.md"

          {
            echo "# Release ${{ steps.version.outputs.tag_name }}"
            echo
            echo "- Version: \`${{ steps.version.outputs.app_version }}\`"
            echo "- Build: \`${{ steps.version.outputs.build_number }}\`"
            echo
            echo "## Changes"
            if [ -n "$PREVIOUS_TAG" ]; then
              git log --pretty='- %s (%h)' "${PREVIOUS_TAG}..HEAD"
            else
              git log --pretty='- %s (%h)'
            fi
          } > "$NOTES_FILE"

          echo "notes_path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.release_title }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          files: ${{ steps.apk.outputs.apk_path }}
          fail_on_unmatched_files: true
          target_commitish: ${{ github.sha }}

