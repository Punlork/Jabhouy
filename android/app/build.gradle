plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def firebaseConfigFiles = [
    file('src/development/google-services.json'),
    file('src/staging/google-services.json'),
    file('src/main/google-services.json'),
]
def hasGoogleServicesConfig = firebaseConfigFiles.any { it.exists() }

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def envOrProperty = { envKey, propertyKey, fallback = null ->
    def envValue = System.getenv(envKey)
    if (envValue != null && !envValue.trim().isEmpty()) {
        return envValue
    }

    def propertyValue = keystoreProperties[propertyKey]
    if (propertyValue != null && !propertyValue.toString().trim().isEmpty()) {
        return propertyValue
    }

    return fallback
}

def resolveStoreFile = { envKey, propertyKey, fallbackPath = null ->
    def rawPath = envOrProperty(envKey, propertyKey, fallbackPath)
    return rawPath ? file(rawPath) : null
}

android {
    namespace "com.pl.shop.management"
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion = "27.0.12077973"


    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
}

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.pl.shop.management"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        // Patrol UI testing: https://patrol.leancode.pl/documentation/native/android-setup
        testInstrumentationRunner "pl.leancode.patrol.PatrolJUnitRunner"
        testInstrumentationRunnerArguments["clearPackageData"] = "true"
    }

    signingConfigs {
        release {
            keyAlias envOrProperty("ANDROID_KEYSTORE_ALIAS", "keyAlias")
            keyPassword envOrProperty("ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD", "keyPassword")
            storeFile resolveStoreFile("ANDROID_KEYSTORE_PATH", "storeFile")
            storePassword envOrProperty("ANDROID_KEYSTORE_PASSWORD", "storePassword")
        }

        developmentRelease {
            keyAlias envOrProperty(
                "ANDROID_DEV_KEYSTORE_ALIAS",
                "devKeyAlias",
                envOrProperty("ANDROID_KEYSTORE_ALIAS", "keyAlias"),
            )
            keyPassword envOrProperty(
                "ANDROID_DEV_KEYSTORE_PRIVATE_KEY_PASSWORD",
                "devKeyPassword",
                envOrProperty("ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD", "keyPassword"),
            )
            storeFile resolveStoreFile(
                "ANDROID_DEV_KEYSTORE_PATH",
                "devStoreFile",
                envOrProperty("ANDROID_KEYSTORE_PATH", "storeFile"),
            )
            storePassword envOrProperty(
                "ANDROID_DEV_KEYSTORE_PASSWORD",
                "devStorePassword",
                envOrProperty("ANDROID_KEYSTORE_PASSWORD", "storePassword"),
            )
        }
    }

    flavorDimensions "default"
    productFlavors { 
        production {
            dimension "default"
            applicationIdSuffix ""
            manifestPlaceholders = [appName: "Jabhouy"]
            signingConfig signingConfigs.release
        }
        staging {
            dimension "default"
            applicationIdSuffix ".stg"
            manifestPlaceholders = [appName: "[STG] Jabhouy"]
            signingConfig signingConfigs.release
        }
        development {
            dimension "default"
            applicationIdSuffix ".dev"
            manifestPlaceholders = [appName: "[DEV] Jabhouy"]
            signingConfig signingConfigs.developmentRelease
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android.txt')
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.20"
    implementation "androidx.work:work-runtime-ktx:2.10.0"
    implementation platform('com.google.firebase:firebase-bom:33.13.0')
    implementation 'com.google.firebase:firebase-common'
    implementation 'com.google.firebase:firebase-firestore'
    implementation 'com.google.android.gms:play-services-tasks:18.3.0'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}

if (hasGoogleServicesConfig) {
    apply plugin: 'com.google.gms.google-services'
} else {
    println('Firebase: no google-services.json found, skipping Google services Gradle plugin.')
}
